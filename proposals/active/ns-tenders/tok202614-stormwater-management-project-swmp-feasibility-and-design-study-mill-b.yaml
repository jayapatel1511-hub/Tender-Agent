  Description: The work covered under this RFP is for the completion of the “Stormwater Management Project Feasibility and Design Study - Mill Brook” for the Town of Kentville. The project will include community engagement, technical assessments, hydrologic and hydraulic analysis, environmental review, conceptual infrastructure design, and implementation planning associated with stormwater management and flood mitigation within the Mill Brook watershed area. This project is intended to provide recommendations based on existing conditions, projected climate impacts, future land use considerations, and evolving infrastructure needs. While previous studies provide valuable foundational information, this project will establish a site-specific framework to address current deficiencies and future climate resilience requirements..
