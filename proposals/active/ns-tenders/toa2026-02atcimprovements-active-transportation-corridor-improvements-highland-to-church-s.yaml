  Description: Sealed quotes addressed to the Town of Antigonish at 274 Main Street, Antigonish, Nova Scotia, will be received up to 2:00 pm June 10, 2026, for tender Active Transportation Corridor Improvements - Highland Drive to Church Street, Tender TOA2026-02. Tender packages may be obtained at the office of the Department of Infrastructure and Engineering at Town Hall, 274 Main St, Antigonish, Nova Scotia. The Work can be generally described to include: the removal of existing concrete curb, gutter and sidewalk, installation of new concrete curb & gutter and trail, removal of existing street asphalt as required, and street asphalt replacement. The work area runs along St Ninian Street from Highland Drive to Church Street. Work requires all traffic control, adjustments to catch basin and manhole covers, valve boxes and related work. The Town reserves the right to waive any informalities or to reject any or all quotes based on changes to the approach to the work, organizational and perceived liability considerations, the financial suitability of proceeding with the execution of the work, individual tenderer's level of experience, available personnel and equipment, the Owners perception of the impact of performance on similar projects, or potential performance problems in keeping schedule targets. The Town reserves the right to omit portions of the work should it be deemed necessary for overall financial reasons..
