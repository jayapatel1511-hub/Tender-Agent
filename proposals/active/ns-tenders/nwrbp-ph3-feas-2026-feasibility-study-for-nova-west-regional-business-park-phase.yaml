  Description: The Municipality of the District of Yarmouth (MODY) is seeking proposals from qualified multidisciplinary consulting firms to undertake a feasibility study for the potential Phase 3 expansion of the Nova West Regional Business Park (NWRBP). The study will evaluate approximately 28.1 hectares (69.4 acres) of municipally identified lands to determine development feasibility, environmental and regulatory constraints, servicing requirements, infrastructure considerations, implementation options, and phased development opportunities to support future industrial and commercial growth within the Municipality. The feasibility study will include a phased assessment approach consisting of high-level screening, environmental and planning review, geotechnical and climate resilience considerations, conceptual servicing and infrastructure analysis, utility coordination, development phasing, and cost estimates..
