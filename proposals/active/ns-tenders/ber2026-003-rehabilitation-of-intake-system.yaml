  Description: The Berwick Electric Commission (BEC), a municipally owned electric utility serving over 1,600 customers, is undertaking a modernization project at the Factorydale Hydroelectric Plant, located at 2545 Harmony Road, Aylesford, Nova Scotia. As part of this modernization effort, BEC is seeking proposals for the design, supply, installation, testing, and commissioning of a rehabilitated Intake System, excluding the Log Boom, which will be procured under a separate contract. The purpose of this intake rehabilitation project is to replace outdated and unsafe intake components with a simple, robust, maintainable, and code-compliant system that improves operator safety, debris exclusion, flow isolation capability, and integration with the refurbished hydroelectric generating unit. Proponents are invited to submit proposals detailing their understanding of the project, technical approach, QA/QC plan, schedule, and cost estimate..
